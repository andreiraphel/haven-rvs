name: ML Continuous Training Pipeline

on:
  schedule:
    # Run automatically every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions UI

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: false

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        cd ml
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install python-dotenv requests

    - name: Run Data Synthesis & Training Script
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        cd ml
        python sync_train.py

    - name: Commit New Model Artifacts
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ml/model_exports/
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update ML models via continuous training pipeline"
        git push
